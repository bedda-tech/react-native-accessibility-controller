name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Check existing issues and the README first.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Include API sketches if helpful.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Screen reading / tree capture
        - Node actions (tap, type, scroll)
        - Coordinate gestures
        - Global actions
        - Overlay
        - Event streaming
        - React hooks
        - TypeScript types
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this
